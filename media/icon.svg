  <circle cx="78" cy="58" r="6" fill="#CDD6F4"/>
  <path d="M44 78 Q64 92 84 78" stroke="#A6E3A1" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- chai cup accent -->
