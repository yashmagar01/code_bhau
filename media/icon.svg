<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Code Bhau marketplace icon -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#11111B"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- code brackets -->
  <path d="M40 28 L20 64 L40 100" stroke="#F9E2AF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88 28 L108 64 L88 100" stroke="#F9E2AF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- friendly smile (Bhau face) -->
